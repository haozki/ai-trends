<!DOCTYPE html>

<head>

<title>AI Trends — 数据看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }

/* === Hero === */
.hero { text-align: center; padding: 80px 24px 60px; }
.hero h1 { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #58a6ff, #a371f7, #f778ba); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
.hero p { font-size: 16px; color: #8b949e; max-width: 520px; margin: 0 auto; line-height: 1.7; }

/* === Cards === */
.cards { display: flex; justify-content: center; gap: 24px; padding: 0 24px 80px; flex-wrap: wrap; max-width: 820px; margin: 0 auto; }
.card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 32px; width: 360px; text-decoration: none; color: inherit; transition: all 0.2s; position: relative; overflow: hidden; }
.card:hover { border-color: #58a6ff; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(88,166,255,0.1); }
.card-icon { font-size: 36px; margin-bottom: 16px; }
.card h2 { font-size: 18px; color: #c9d1d9; margin-bottom: 8px; }
.card p { font-size: 13px; color: #8b949e; line-height: 1.6; margin-bottom: 16px; }
.card-tag { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px; background: #21262d; color: #8b949e; }
.card-arrow { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #30363d; font-size: 20px; transition: all 0.2s; }
.card:hover .card-arrow { color: #58a6ff; right: 16px; }

/* === Footer === */
.footer { text-align: center; padding: 24px; font-size: 12px; color: #484f58; border-top: 1px solid #21262d; }
</style>
</head>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIBOX — AI 科技导航</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00ffc8;
            --magenta: #ff2d7b;
            --amber: #ffb800;
            --bg: #0a0a0c;
            --surface: #141418;
            --surface-raised: #1c1c22;
            --text: #f0f0f0;
            --text-muted: #6b6b78;
            --border: rgba(255,255,255,0.06);
            --glow-cyan: 0 0 40px rgba(0,255,200,0.15);
            --glow-magenta: 0 0 40px rgba(255,45,123,0.15);
            --font-display: 'Noto Sans SC', 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 网格背景 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* 噪点纹理 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* 导航 */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10,10,12,0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            padding: 0 40px;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 28px;
            height: 28px;
            background: var(--cyan);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: inline-block;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 2px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 3px;
        }

        .nav-link {
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.25s ease;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            font-family: var(--font-body);
            letter-spacing: 0.02em;
        }

        .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.06); }

        .nav-link.active {
            color: var(--bg);
            background: var(--cyan);
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            position: relative;
            z-index: 1;
        }

        .page { display: none; }
        .page.active {
            display: block;
            animation: pageReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes pageReveal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== 首页 ========== */
        .hero {
            padding: 100px 0 80px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            min-height: 70vh;
        }

        .hero-text { max-width: 600px; }

        .hero-eyebrow {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--cyan);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hero-eyebrow::before {
            content: '';
            width: 32px;
            height: 1px;
            background: var(--cyan);
        }

        .hero-title {
            font-size: clamp(42px, 5vw, 72px);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2px;
            margin-bottom: 24px;
        }

        .hero-title .line { display: block; }
        .hero-title .line:first-child { color: var(--text); }
        .hero-title .line:last-child {
            color: transparent;
            -webkit-text-stroke: 1.5px var(--cyan);
        }

        .hero-desc {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: var(--cyan);
            color: var(--bg);
            font-weight: 700;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .hero-cta:hover {
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        .hero-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            background: var(--surface-raised);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .stat-card:hover::before { opacity: 1; }

        .stat-number {
            font-family: var(--font-mono);
            font-size: 40px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .stat-number .unit {
            font-size: 16px;
            color: var(--cyan);
            margin-left: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* ========== 榜单页面 ========== */
        .ranking-header {
            padding: 60px 0 40px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .ranking-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ranking-title-icon {
            width: 40px;
            height: 40px;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .ranking-update {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .ranking-scroll {
            max-height: calc(100vh - 220px);
            overflow-y: auto;
            padding-bottom: 40px;
        }

        .ranking-scroll::-webkit-scrollbar { width: 4px; }
        .ranking-scroll::-webkit-scrollbar-track { background: transparent; }
        .ranking-scroll::-webkit-scrollbar-thumb {
            background: var(--surface-raised);
            border-radius: 2px;
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ranking-item {
            display: grid;
            grid-template-columns: 60px 1fr auto;
            align-items: center;
            gap: 20px;
            padding: 18px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .ranking-item::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--cyan);
            border-radius: 0 2px 2px 0;
            transition: height 0.3s ease;
        }

        .ranking-item:hover {
            background: var(--surface-raised);
            border-color: rgba(0,255,200,0.1);
            transform: translateX(4px);
        }

        .ranking-item:hover::after { height: 60%; }

        .ranking-rank {
            font-family: var(--font-mono);
            font-size: 20px;
            font-weight: 700;
            text-align: center;
        }

        .ranking-rank.top-1 { color: var(--amber); }
        .ranking-rank.top-2 { color: #c0c0c0; }
        .ranking-rank.top-3 { color: #cd7f32; }
        .ranking-rank.normal { color: var(--text-muted); }

        .ranking-info { min-width: 0; }

        .ranking-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .ranking-logo {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            object-fit: contain;
            flex-shrink: 0;
            filter: brightness(0) invert(1);
        }

        .ranking-badge {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0,255,200,0.1);
            color: var(--cyan);
            border: 1px solid rgba(0,255,200,0.2);
            letter-spacing: 0.05em;
        }

        .ranking-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ranking-metrics {
            text-align: right;
            flex-shrink: 0;
        }

        .metric-value {
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .metric-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            font-family: var(--font-mono);
            letter-spacing: 0.05em;
        }

        /* 榜单项入场动画 */
        .ranking-item {
            opacity: 0;
            transform: translateY(12px);
            animation: itemReveal 0.4s ease forwards;
        }
        .ranking-item:nth-child(1) { animation-delay: 0.02s; }
        .ranking-item:nth-child(2) { animation-delay: 0.04s; }
        .ranking-item:nth-child(3) { animation-delay: 0.06s; }
        .ranking-item:nth-child(4) { animation-delay: 0.08s; }
        .ranking-item:nth-child(5) { animation-delay: 0.1s; }
        .ranking-item:nth-child(6) { animation-delay: 0.12s; }
        .ranking-item:nth-child(7) { animation-delay: 0.14s; }
        .ranking-item:nth-child(8) { animation-delay: 0.16s; }
        .ranking-item:nth-child(9) { animation-delay: 0.18s; }
        .ranking-item:nth-child(10) { animation-delay: 0.2s; }

        @keyframes itemReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 二级导航 */
        .sub-nav {
            display: flex;
            gap: 2px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 2px;
            margin-bottom: 20px;
            width: fit-content;
        }
        .sub-nav-link {
            padding: 6px 18px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.25s ease;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            font-family: var(--font-body);
        }
        .sub-nav-link:hover { color: var(--text); background: rgba(255,255,255,0.06); }
        .sub-nav-link.active { color: var(--bg); background: var(--cyan); }
        .sub-page { display: none; }
        .sub-page.active { display: block; }

        /* 响应式 */
        @media (max-width: 1024px) {
            .hero { grid-template-columns: 1fr; gap: 40px; padding: 60px 0 40px; }
            .hero-text { max-width: 100%; }
            .hero-stats { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 768px) {
            .nav-container { padding: 0 20px; }
            .nav-link { padding: 8px 14px; font-size: 12px; }
            .container { padding: 0 20px; }
            .hero-title { letter-spacing: -1px; }
            .hero-stats { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-number { font-size: 28px; }
            .ranking-header { flex-direction: column; align-items: flex-start; gap: 8px; padding: 40px 0 24px; }
            .ranking-title { font-size: 22px; }
            .ranking-item {
                grid-template-columns: 44px 1fr;
                gap: 12px;
            }
            .ranking-metrics { display: none; }
            .ranking-desc { white-space: normal; }
        }

        @media (max-width: 480px) {
            .hero { padding: 40px 0 20px; }
            .hero-title { font-size: 32px; }
            .hero-stats { grid-template-columns: 1fr; }
            .nav-container { height: 56px; }
        }
    </style>
</head>

        function renderRanking(containerId, data, showMetrics = false) {
            const container = document.getElementById(containerId);
            let html = '';

            data.forEach((item, index) => {
                const rankClass = index < 3 ? `top-${index + 1}` : 'normal';

                html += `
                    <div class="ranking-item">
                        <div class="ranking-rank ${rankClass}">#${index + 1}</div>
                        <div class="ranking-info">
                            <div class="ranking-name">
                                ${item.logo ? `<img class="ranking-logo" src="${item.logo}" alt="">` : ''}
                                ${item.name}
                                <span class="ranking-badge">${item.badge}</span>
                            </div>
                            <div class="ranking-desc">${item.desc}</div>
                        </div>
                        <div class="ranking-metrics">
                            <div class="metric-value">${showMetrics ? item.metric : '⭐ ' + item.stars}</div>
                            <div class="metric-label">${showMetrics ? item.metricLabel : 'GitHub Stars'}</div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            // 切换页面时重置二级导航到默认
            if (pageId === 'models') switchSubTab('default');
        }

        function switchSubTab(tabId, el) {
            document.querySelectorAll('#models .sub-nav-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('#models .sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById('sub-' + tabId).classList.add('active');
            if (el) el.classList.add('active');
            else document.querySelector('#models .sub-nav-link').classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderRanking('models-list', modelsData, true);
            renderRanking('cn-models-list', cnModelsData, true);
            renderRanking('projects-list', projectsData, false);
            renderRanking('agents-list', agentsData, true);
        });
